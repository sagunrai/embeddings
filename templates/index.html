<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Word Embeddings Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; }
        #neighbors, #embedding { max-height: 300px; overflow-y: auto; }
        h2 { margin-bottom: 30px; }
        pre { background: #f1f1f1; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="text-center">Word Embeddings Explorer</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <input type="text" id="word" class="form-control mb-3" placeholder="Enter a word">
            <select id="method" class="form-select mb-3">
                <option value="tfidf">TF-IDF</option>
                <option value="glove">GloVe</option>
            </select>
            <label for="top_n">Top Neighbors: <span id="top_n_val">5</span></label>
            <input type="range" id="top_n" class="form-range mb-3" min="1" max="10" value="5">
            <button class="btn btn-primary w-100 mb-3" onclick="getEmbedding()">Get Embedding</button>
            
            <h4>Embedding Vector:</h4>
            <pre id="embedding">--</pre>
            
            <h4>Top Neighbors:</h4>
            <ul id="neighbors" class="list-group"></ul>
        </div>
    </div>
</div>

<script>
const top_n_slider = document.getElementById('top_n');
const top_n_val = document.getElementById('top_n_val');
top_n_slider.oninput = () => { top_n_val.innerText = top_n_slider.value; };

function getEmbedding() {
    const word = document.getElementById('word').value.trim();
    const method = document.getElementById('method').value;
    const top_n = top_n_slider.value;

    if(word === "") { alert("Please enter a word!"); return; }

    fetch('/embed', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({word, method, top_n})
    }).then(res => res.json())
      .then(data => {
          // Embedding
          const embedElem = document.getElementById('embedding');
          embedElem.innerText = data.embedding ? JSON.stringify(data.embedding, null, 2) : data.error;

          // Neighbors
          const neighborsList = document.getElementById('neighbors');
          neighborsList.innerHTML = '';
          if(data.neighbors && data.neighbors.length > 0){
              data.neighbors.forEach(n => {
                  if(n.word !== undefined && n.similarity !== undefined){
                      const li = document.createElement('li');
                      li.className = 'list-group-item';
                      li.innerText = `${n.word} (${n.similarity.toFixed(3)})`;
                      neighborsList.appendChild(li);
                  }
              });
          } else {
              const li = document.createElement('li');
              li.className = 'list-group-item text-muted';
              li.innerText = "No neighbors found.";
              neighborsList.appendChild(li);
          }
      }).catch(err => alert("Error: " + err));
}
</script>
</body>
</html>
